{% for message in messages %}
<div class="rounded-md p-3 mb-2 {% if message.tags == 'success' %}bg-green-50 border border-green-200 text-green-800{% elif message.tags == 'error' %}bg-red-50 border border-red-200 text-red-800{% elif message.tags == 'warning' %}bg-yellow-50 border border-yellow-200 text-yellow-800{% else %}bg-blue-50 border border-blue-200 text-blue-800{% endif %} flex items-center justify-between">
    <span class="text-sm">{{ message }}</span>
    <button hx-on::after-request="this.closest('.rounded-md').remove()" class="text-lg font-bold ml-4">&times;</button>
</div>
{% endfor %}
