{% if cart|length > 0 %}
<div class="list-group">
    {% for item in cart.items %}
    <div class="list-group-item d-flex align-items-center">
        <img src="{{ item.product.image.url|default:'/static/img/placeholder.png' }}" 
             alt="{{ item.product.name }}" 
             style="width: 50px; height: 50px; object-fit: cover;" class="rounded me-3">
        <div class="flex-grow-1">
            <h6 class="mb-0">{{ item.product.name }}</h6>
            <small class="text-muted">{{ item.quantity }} × ${{ item.product.price }}</small>
        </div>
        <strong class="text-success">${{ item.subtotal|floatformat:2 }}</strong>
    </div>
    {% endfor %}
</div>
<div class="mt-3 p-3 bg-light rounded">
    <div class="d-flex justify-content-between">
        <strong>Total:</strong>
        <strong class="text-primary">${{ cart.get_total_price|floatformat:2 }}</strong>
    </div>
</div>
{% else %}
<div class="text-center py-4">
    <i class="bi bi-cart-x text-muted" style="font-size: 3rem;"></i>
    <p class="mt-2 text-muted">Your cart is empty</p>
</div>
{% endif %}
