{% if products %}
<div class="py-2">
    {% for product in products %}
    <a href="{{ product.get_absolute_url }}" 
       class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 transition-colors cursor-pointer">
        {% if product.image %}
        <img src="{{ product.image.url }}" 
             alt="{{ product.name }}" 
             class="w-12 h-12 object-cover rounded"
             style="width: 50px; height: 50px;">
        {% else %}
        <div class="w-12 h-12 bg-gray-200 rounded flex items-center justify-center">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </div>
        {% endif %}
        <div class="flex-1 min-w-0">
            <h6 class="text-sm font-medium text-gray-900 truncate">{{ product.name }}</h6>
            <p class="text-sm font-bold text-gray-900">${{ product.price }}</p>
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<div class="px-4 py-8 text-gray-500 text-center">No products found</div>
{% endif %}
